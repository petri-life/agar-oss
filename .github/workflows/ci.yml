name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --frozen

      - name: Smoke test (OASIS, stub model — no LLM calls)
        run: uv run python smoke_test.py

      - name: Validate sample personas parse and assemble
        run: |
          uv run python - <<'PY'
          from api.sampler import assemble_population
          for mix in (0.0, 0.5, 1.0):
              pop = assemble_population(persona_mix=mix, seed=42)
              assert len(pop) > 0, f"empty population at mix={mix}"
              for p in pop:
                  assert ("persona_id" in p) or ("uid" in p), f"persona missing id: {p!r}"
              print(f"mix={mix}: {len(pop)} profiles OK")
          PY
